name: Deploy Web to Cloud Run

on:
  workflow_dispatch:   # Manual trigger only

env:
  GCP_PROJECT: retrolab-prod
  GCP_REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev/retrolab-prod/retrolab
  IMAGE: asia-southeast1-docker.pkg.dev/retrolab-prod/retrolab/web

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Auth Docker to GAR
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build & Push
        run: |
          docker build -f Dockerfile.web \
            --build-arg NOTION_API_KEY="${{ secrets.NOTION_API_KEY }}" \
            --build-arg NOTION_DATABASE_ID="${{ secrets.NOTION_DATABASE_ID }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --build-arg NEXT_PUBLIC_SITE_URL="https://retrolab.com.vn" \
            -t ${{ env.IMAGE }}:latest \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            .
          docker push ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy retrolab-web \
            --image ${{ env.IMAGE }}:latest \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3001 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "NOTION_API_KEY=${{ secrets.NOTION_API_KEY }}" \
            --set-env-vars "NOTION_DATABASE_ID=${{ secrets.NOTION_DATABASE_ID }}" \
            --set-env-vars "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --set-env-vars "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --set-env-vars "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            --set-env-vars "NEXT_PUBLIC_SITE_URL=https://retrolab.com.vn"
