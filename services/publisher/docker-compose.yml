# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Publisher Service — Docker Compose
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Connects to the same PostgreSQL as the news-pipeline.
# Start: docker compose up -d
# Logs:  docker compose logs -f backend

version: "3.9"

services:
  # ── Backend (FastAPI) ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "8001:8001"
    restart: unless-stopped
    command: >
      uvicorn backend.main:app --host 0.0.0.0 --port 8001 --reload

  # ── Frontend (Vite + React) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:8001
    depends_on:
      - backend
    restart: unless-stopped
