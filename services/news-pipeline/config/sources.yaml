  - name: GSMArena
    type: crawl
    seed_url: https://www.gsmarena.com/news.php3
    article_url_pattern: 'gsmarena\.com/[a-z0-9_-]+-news-\d+\.php'
    article_selector: 'h3 a, .news-item a'
    js_required: false
    enabled: true
    tags: [smartphones, reviews, specs]

  - name: Phandroid
    type: crawl
    seed_url: https://phandroid.com/category/android-news/
    article_url_pattern: 'phandroid\.com/\d{4}/\d{2}/'
    article_selector: 'h2 a, h3 a'
    js_required: false
    enabled: true
    tags: [android, smartphones, apps]

  - name: NotebookCheck
    type: crawl
    seed_url: https://www.notebookcheck.net/News.5.0.html
    article_url_pattern: 'notebookcheck\.net/[a-z0-9-]+\.\d+\.0\.html'
    article_selector: '.teaser-title a, h3 a'
    js_required: false
    enabled: true
    tags: [laptops, smartphones, reviews, benchmarks]
