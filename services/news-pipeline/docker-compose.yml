# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# News Pipeline — Docker Compose
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Start all services: docker compose up -d
# View logs:         docker compose logs -f worker

x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  volumes:
    - ./config:/app/config   # persist & share sources.yaml with host

services:
  # ── Infrastructure ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline_secret
      POSTGRES_DB: news_pipeline
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes   # enable AOF persistence
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Migrations (run once) ───────────────────────────────────
  migrate:
    <<: *common
    command: >
      sh -c "alembic upgrade head"
    restart: "no"

  # ── Worker: scraper + rewriter + image search ───────────────
  worker:
    <<: *common
    command: >
      celery -A workers.celery_app worker
      -Q scraper_queue,rewriter_queue,image_search_queue,default
      --loglevel=info
      --concurrency=4

  # NOTE: Celery Beat has been REMOVED.
  # All scheduled runs are managed by the publisher's built-in scheduler,
  # which is controlled via the admin dashboard's Config tab.
  # Do NOT re-add a beat service — it will cause phantom scraping.
  # ── Review API (FastAPI) ────────────────────────────────────
  api:
    <<: *common
    command: >
      uvicorn pipeline.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8002:8000"

volumes:
  pgdata:
  redisdata:
